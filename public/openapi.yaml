                  summary: 'Subscription Cancelled with Remaining Credits'
                  description: 'Triggered when the doctor cancels the subscription but still has remaining summaries left to use until the expiration date.'
                  value:
                    success: true
                    message: "Subscription cancelled. You can still use your remaining 38 summaries until Sun, May 31, 2026"
                    data: null
                CancelledLimitReached:
                  summary: 'Subscription Cancelled with Limit Reached'
                  description: 'Triggered when the doctor cancels the subscription and has already consumed 100% of the allowed summaries limit.'
                  value:
                    success: true
                    message: "Subscription cancelled. Note: You have already reached your limit of 50 summaries."
                    data: null
                DisabledPayPerUse:
                  summary: 'Pay-Per-Use Mode Disabled'
                  description: 'Triggered when a doctor on pay-per-use cancels their billing style, reverting the doctor billing_mode back to null.'
