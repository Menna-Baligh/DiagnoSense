  '/api/v1/profile':
    patch:
      summary: 'Update Patient Profile Contact'
      operationId: patchApiV1Profile
      description: 'Updates the authenticated patient’s primary contact channel (Email or Phone number). Validates the entry format and checks for global system uniqueness, ignoring the user’s current record.'
      tags:
        - Mobile App
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contact:
                  type: string
                  description: 'A newly updated valid Email address or Egyptian phone number constraint.'
                  example: "menna.patient@example.com"
      responses:
        200:
          description: 'Patient account profile contact updated successfully.'
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                message: "Profile updated successfully"
                data:
                  name: "Menna Baligh"
                  contact: "menna.patient@example.com"
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          description: 'Not Found - User session authenticated but no associated patient record structure exists.'
          content:
            application/json:
              schema:
                type: object
              example:
                success: false
                message: "Patient Profile Not Found"
                data: null
        422:
          description: 'Validation Error - Contact value fails custom contact rules or is already registered to another user.'
          content:
            application/json:
              schema:
                type: object
              example:
                success: false
                message: "The given data was invalid."
                errors:
                  contact:
                    - "The contact has already been taken."
        500:
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                type: object
              example:
                success: false
                message: "An error occurred while updating profile."
                data: null



