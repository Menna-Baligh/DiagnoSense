                  nullable: false
                medications:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                allergies:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                family_history:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                lab:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
                    type: string
                    format: binary
                radiology:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
                    type: string
                    format: binary
                medical_history:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
