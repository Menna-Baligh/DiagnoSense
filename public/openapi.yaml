  '/api/v1/fcm-token':
    patch:
      summary: 'Update Patient FCM Registration Token'
      operationId: patchApiV1FcmToken
      description: 'Updates or registers the Firebase Cloud Messaging device registration token for the authenticated patient user session to enable push notifications.'
      tags:
        - Mobile App
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fcm_token
              properties:
                fcm_token:
                  type: string
                  description: 'The unique cloud token string returned by the client device OS push subsystem.'
                  example: "bk3RNwM-3Q0:CI2g_X56...cl1Vy"
      responses:
        200:
          description: 'Firebase device context registration string cached successfully.'
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                message: "FCM Token Updated Successfully"
                data: null
        401:
          $ref: '#/components/responses/Unauthorized'
        422:
          description: 'Validation Error - Missing the fcm_token request payload parameter.'
        500:
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                type: object
              example:
                success: false
                message: "An error occurred while updating the FCM token."
                data: null

