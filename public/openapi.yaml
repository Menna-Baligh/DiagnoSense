      put:
        summary: 'Update Doctor Information'
        operationId: putApiDoctorsDoctorId
        description: 'Allows the doctor to update their name and specialization.'
        tags:
          - Doctor Profile
        security:
          - sanctum: []
        parameters:
          - in: path
            name: doctorId
            required: true
