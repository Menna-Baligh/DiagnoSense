  '/api/chatbot/{patientId}':
      post:
        summary: 'Ask DiagnoBot about Patient'
        operationId: postApiChatbotPatientId
        description: 'Sends a medical question to the AI chatbot regarding a specific patient. If the patient data is not yet processed, it triggers an ingestion job.'
        tags:
          - Patient Profile
        security:
          - sanctum: []
        parameters:
          - in: path
            name: patientId
            required: true
            description: 'The ID of the patient the question is about.'
            schema:
              type: integer
            example: 101
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - question
                properties:
                  question:
                    type: string
                    minLength: 3
                    description: 'The specific question about the patient’s medical history or reports.'
                    example: "What are the key risks found in the latest blood test?"
        responses:
          200:
            description: 'AI Answer retrieved successfully'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: true
                    message: "Answer from chatbot"
                    data: "Based on the reports, the patient shows elevated glucose levels suggesting a risk of Type 2 Diabetes."
          202:
            description: 'Accepted - Data is being prepared'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: true
                    message: "Preparing patient data..."
                    data: null
          403:
            description: 'Forbidden - Doctor does not own this patient record'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: false
                    message: "Unauthorized"
          404:
            description: 'Patient not found'
          401:
            $ref: '#/components/responses/Unauthorized'
          500:
            description: 'Internal Server Error'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: false
                    message: "Failed to get answer from chatbot"
  '/api/support':
      post:
        summary: 'Send Support Request'
        operationId: postApiSupport
        description: 'Allows doctors to submit support requests (technical, billing, or general) with optional attachments.'
        tags:
          - Support & Help
        security:
          - sanctum: []
        requestBody:
          required: true
          content:
            multipart/form-data:
              schema:
                type: object
                required:
                  - category
                  - urgency
                  - message
                properties:
                  name:
                    type: string
                    maxLength: 255
                    description: 'Optional name. Defaults to user name if null.'
                    example: "Dr. Layla"
                    nullable: true
                  category:
                    type: string
                    enum: [technical, billing, general]
                    example: "technical"
                  urgency:
                    type: string
                    enum: [low, medium, high]
                    example: "high"
                  message:
                    type: string
                    example: "I am unable to see the latest AI analysis for patient #48."
                  attachment:
                    type: string
                    format: binary
                    description: 'Optional file (jpg, png, pdf). Max size: 10MB.'
                    nullable: true
        responses:
          201:
            description: 'Support message submitted successfully'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: true
                    message: "Support message submitted successfully we will get back to you shortly."
                    data: null
          403:
            description: 'Forbidden - User is not a doctor'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: false
                    message: "Unauthorized"
          422:
            description: 'Validation Error'
          401:
            $ref: '#/components/responses/Unauthorized'
          500:
            description: 'Server Error'
            content:
              application/json:
                schema:
                  type: object
                  example:
                    success: false
                    message: "Failed to submit message: [Error details]"
  '/api/doctors/{doctorId}':
      get:
