  '/api/v1/patients/{patientId}/comparative-analysis':
    get:
      summary: 'Get Patient Comparative Analysis'
      operationId: getApiV1PatientsComparativeAnalysis
      description: 'Returns a historical trend analysis of all quantified lab tests for a specific patient. Groups results by test standard name, computes deltas (change and percentage), tracks dynamic trends (up/down/stable), and supplies chronological data coordinates optimized for plotting charts.'
      tags:
        - Patient Profile
      security:
        - sanctum: []
      parameters:
        - in: path
          name: patientId
          required: true
          description: 'The unique numerical ID of the patient.'
          schema:
            type: integer
          example: 48
      responses:
        200:
          description: 'Success - Returns analytical dataset payload. Message safely updates depending on pipeline or failure flags.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Comparative analysis retrieved successfully."
                  data:
                    type: object
                    nullable: true
                    properties:
                      still_processing:
                        type: boolean
                        description: 'True if a new AI report ingestion job is currently running in the background.'
                        example: false
                      analysis:
                        type: array
                        items:
                          type: object
                          properties:
                            test_name:
                              type: string
                              example: "Hemoglobin (Hb)"
                            category:
                              type: string
                              example: "CBC"
                            unit:
                              type: string
                              example: "g/dL"
                            comparison:
                              type: object
                              properties:
                                current_value:
                                  type: number
                                  example: 14.5
                                previous_value:
                                  type: image
                                  oneOf:
                                    - type: number
                                    - type: string
                                  description: 'Returns the numerical value of the previous visit, or string "Initial" if this is the patient first record.'
                                  example: 13.2
                                change_value:
                                  type: number
                                  example: 1.3
                                change_percentage:
                                  type: number
                                  example: 9.8
                                trend:
                                  type: string
                                  enum: [up, down, stable]
                                  example: "up"
                                status:
                                  type: string
                                  example: "Normal"
                            all_points:
                              type: array
                              description: 'Chronological timeline points array used by charting libraries to generate graph coordinates.'
                              items:
                                type: object
                                properties:
                                  visit_label:
                                    type: string
                                    example: "Visit #1"
                                  value:
                                    type: number
                                    example: 13.2
                                  status:
                                    type: string
                                    example: "Normal"
                                  date:
                                    type: string
                                    format: date
                                    example: "2026-01-10"
              examples:
                SuccessWithData:
                  summary: 'Standard Complete History Response'
                  value:
                    success: true
                    message: "Comparative analysis retrieved successfully."
                    data:
                      still_processing: false
                      analysis:
                        - test_name: "Hemoglobin (Hb)"
                          category: "CBC"
                          unit: "g/dL"
                          comparison:
                            current_value: 14.5
                            previous_value: 13.2
                            change_value: 1.3
                            change_percentage: 9.8
                            trend: "up"
                            status: "Normal"
                          all_points:
                            - { visit_label: "Visit #1", value: 13.2, status: "Normal", date: "2026-01-10" }
                            - { visit_label: "Visit #2", value: 14.5, status: "Normal", date: "2026-03-20" }
                AiProcessingFallback:
                  summary: 'AI Processing Fallback State'
                  value:
                    success: true
                    message: "Comparative analysis retrieved successfully."
                    data:
                      still_processing: true
                      analysis:
                        - test_name: "Blood Sugar"
                          category: "Diabetes"
                          unit: "mg/dL"
                          comparison:
                            current_value: 110
                            previous_value: "Initial"
                            change_value: 0
                            change_percentage: 0
                            trend: "stable"
                            status: "Normal"
                          all_points:
                            - { visit_label: "Visit #1", value: 110, status: "Normal", date: "2026-03-20" }
                AiFailedFallback:
                  summary: 'AI Extraction Failure State'
                  value:
                    success: true
                    message: "Note: The AI failed to extract data from the latest reports. Showing historical data only."
                    data:
                      still_processing: false
                      analysis: []
                EmptyHistory:
                  summary: 'No Historical Data Found Response'
                  value:
                    success: true
                    message: "No comparative analysis data available for this patient."
                    data: null
        401:
          $ref: '#/components/responses/Unauthorized'
        500:
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "An error occurred while fetching comparative analysis."
                  data: null
