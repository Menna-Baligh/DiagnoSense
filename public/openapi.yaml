openapi: 3.0.3
info:
  title: 'DiagnoSense API Documentation'
  description: ''
  version: 1.0.0
servers:
  - url: 'http://localhost:8000'
tags:
  - name: Auth
    description: 'Operations related to User Authentication (Login, Register, OTP, etc.)'
  - name: Patients List
    description: 'Operations related to the list of patients (viewing, filtering, searching, etc.)'
  - name: Patient Profile
    description: 'Operations related to a specific patient (viewing profile, adding notes, updating status, etc.)'
  - name: Subscriptions
    description: 'Operations related to subscription plans and transactions.'
  - name: Notifications
    description: 'Operations related to user notifications.'
  - name: Dashboard
    description: 'Operations related to dashboard data and summaries.'
  - name: Support & Help
    description: 'Operations related to customer support and help resources.'
  - name: Doctor Profile
    description: 'Operations related to doctor profile management.'

paths:
  '/api/v1/auth/register':
    post:
      summary: 'Register'
      operationId: postApiV1AuthRegister
      description: 'Creates a new doctor account using a unified contact field (Email or Phone) and returns an access token.'
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - contact
                - password
                - password_confirmation
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: "Menna Baligh"
                contact:
                  type: string
                  description: 'Can be a valid Email address or a Phone number.'
                  example: "menna@example.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "password123"
                password_confirmation:
                  type: string
                  format: password
                  example: "password123"
      responses:
        201:
          description: 'User registered successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "User registered successfully"
                  data:
                    user:
                      id: 1
                      name: "Menna Baligh"
                      contact: "menna@example.com"
                      created_at: "2026-05-08 01:00:00"
                      updated_at: "2026-05-08 01:00:00"
                    token: "1|def456..."
        422:
          description: 'Validation Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "The contact has already been taken."
                  data: null
        500:
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to register user, please try again later."
                  data: null

  '/api/v1/auth/login/{type}':
    post:
      summary: 'Login'
      operationId: postApiV1AuthLogin
      description: 'Authenticates a user (doctor or patient) using their contact (Email or Phone) and returns an access token.'
      tags:
        - Auth
      parameters:
        - in: path
          name: type
          required: true
          description: 'The type of user attempting to login.'
          schema:
            type: string
            enum: [doctor, patient]
          example: doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contact
                - password
              properties:
                contact:
                  type: string
                  description: 'The user email address or phone number.'
                  example: "menna@example.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "password123"
      responses:
        200:
          description: 'Login successful'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Login successful"
                  data:
                    user:
                      id: 1
                      name: "Menna Baligh"
                      contact: "menna@example.com"
                      created_at: "2026-05-08 01:00:00"
                      updated_at: "2026-05-08 01:00:00"
                    token: "2|ghi789..."
        401:
          description: 'Unauthorized - Invalid credentials'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Invalid credentials"
                  data: null
        422:
          description: 'Validation Error - Invalid contact format or missing fields'
        500:
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to login, please try again later."

  '/api/v1/auth/forget-password/{type}':
    post:
      summary: 'Forget Password'
      operationId: postApiV1AuthForgetPassword
      description: 'Sends a 6-digit OTP to the provided contact (email or phone) if the user exists.'
      tags:
        - Auth
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [doctor, patient]
          example: doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contact]
              properties:
                contact:
                  type: string
                  description: 'The registered email or phone number.'
                  example: "menna@example.com"
      responses:
        200:
          description: 'OTP sent successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "OTP has been sent to your registered contact."
        404:
          description: 'User not found'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "User not found with these credentials."
        422:
          description: 'Validation Error'

  '/api/v1/auth/verify-otp/{type}':
    post:
      summary: 'Verify OTP'
      operationId: postApiV1AuthVerifyOtp
      description: 'Validates the OTP and returns a temporary reset token to be used for password reset.'
      tags:
        - Auth
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [doctor, patient]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contact, otp]
              properties:
                contact:
                  type: string
                  example: "menna@example.com"
                otp:
                  type: string
                  example: "123456"
      responses:
        200:
          description: 'OTP verified successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "OTP verified. You can now reset your password."
                  data:
                    reset_token: "3|abc123token..."
        400:
          description: 'Invalid OTP or User Type'

  '/api/v1/auth/reset-password/{type}':
    post:
      summary: 'Reset Password'
      operationId: postApiV1AuthResetPassword
      description: 'Updates the password using the reset token obtained from OTP verification.'
      tags:
        - Auth
      security:
        - sanctum: []
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [doctor, patient]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, password_confirmation]
              properties:
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "new_secure_password"
                password_confirmation:
                  type: string
                  format: password
                  example: "new_secure_password"
      responses:
        200:
          description: 'Password reset successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Password has been reset successfully."
        401:
          description: 'Unauthorized - Invalid or expired reset token'

  '/api/v1/auth/logout/{type}':
    post:
      summary: 'Logout'
      operationId: postApiV1AuthLogout
      description: 'Revokes the current access token for the authenticated doctor or patient.'
      tags:
        - Auth
      security:
        - sanctum: []
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [doctor, patient]
          example: doctor
      responses:
        200:
          description: 'Logout successful'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Logout successful"
                  data: null
        401:
          $ref: '#/components/responses/Unauthorized'

  '/api/v1/auth/verify-contact':
    post:
      summary: 'Verify Contact'
      operationId: postApiV1AuthVerifyContact
      description: 'Verifies the user contact (email or phone) using the 6-digit OTP sent during registration.'
      tags:
        - Auth
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "123456"
      responses:
        200:
          description: 'Verification successful'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "User verified successfully."
        401:
          description: 'Invalid or expired OTP'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Invalid or expired OTP."

  '/api/v1/auth/resend-otp':
    get:
      summary: 'Resend Verification OTP'
      operationId: getApiV1AuthResendOtp
      description: 'Triggers a new OTP to be sent to the user registered contact if not already verified.'
      tags:
        - Auth
      security:
        - sanctum: []
      responses:
        200:
          description: 'OTP sent successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "OTP sent successfully."
        409:
          description: 'Conflict - User already verified'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "User already verified."
        401:
          $ref: '#/components/responses/Unauthorized'

  '/api/v1/auth/google/redirect':
    get:
      summary: 'Login With Google'
      operationId: getApiV1AuthGoogleRedirect
      description: 'Generates and returns the Google OAuth2 authorization URL. The frontend should redirect the user to this URL.'
      tags:
        - Auth
      security: []
      responses:
        200:
          description: 'Redirect URL generated successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Redirect URL generated"
                  data:
                    url: "https://accounts.google.com/o/oauth2/auth?client_id=1070705461335...&redirect_uri=...&scope=openid+profile+email&response_type=code"
        500:
          description: 'Server Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unable to connect to Google at the moment"
                  data: null

  '/api/v1/patients':
    get:
      summary: 'List + Search + Filter'
      operationId: getApiV1PatientsIndex
      description: 'Retrieves a paginated list of patients associated with the authenticated doctor. Supports searching by name/National ID and filtering by health status.'
      tags:
        - Patients List
      security:
        - sanctum: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: 'Search by patient name or National ID.'
          example: "Ahmed"
        - in: query
          name: status
          schema:
            type: string
            enum: [critical, stable, under review]
          description: 'Filter patients by their current health status.'
          example: "stable"
        - in: query
          name: page
          schema:
            type: integer
          description: 'The page number for pagination.'
          example: 1
      responses:
        200:
          description: 'Patients list retrieved successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Patients list retrieved successfully"
                  data:
                    data:
                      - id: 48
                        name: "Menna Baligh"
                        age: 22
                        status: "stable"
                        ai_insight: "Patient shows steady recovery signs."
                        last_visit: "May 01, 2026"
                        next_appointment: "May 15, 2026"
                      - id: 50
                        name: "Ahmed Mohamed"
                        age: 45
                        status: "critical"
                        ai_insight: "Abnormal cardiac rhythm detected."
                        last_visit: "May 07, 2026"
                        next_appointment: "Not scheduled"
                    links:
                      first: "http://localhost:8000/api/v1/patients?page=1"
                      last: "http://localhost:8000/api/v1/patients?page=5"
                      prev: null
                      next: "http://localhost:8000/api/v1/patients?page=2"
                    meta:
                      current_page: 1
                      from: 1
                      last_page: 5
                      path: "http://localhost:8000/api/v1/patients"
                      per_page: 12
                      to: 12
                      total: 60
        401:
          $ref: '#/components/responses/Unauthorized'
        500:
          description: 'Internal Server Error'
    post:
      summary: 'Create Patient & Upload Medical Files'
      operationId: postApiV1PatientsStore
      description: 'Creates a new patient record with their complete medical history profile and triggers simultaneous background workflows for AI Extraction and Comparative Analytics. Requires authentication and at least one uploaded document file type.'
      tags:
        - Patients List
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - contact
                - date_of_birth
                - gender
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: 'Full name of the patient.'
                  example: "Ahmed Mohamed"
                contact:
                  type: string
                  description: 'Unique identifier contact (Must be a valid Email or Phone Number validated by ValidContactRule).'
                  example: "ahmed.patient@example.com"
                date_of_birth:
                  type: string
                  format: date
                  description: 'Patient date of birth used to dynamically calculate age.'
                  example: "1984-05-12"
                gender:
                  type: string
                  enum: [male, female]
                  description: 'Biological sex designation.'
                  example: "male"
                national_id:
                  type: string
                  maxLength: 14
                  description: 'Optional unique 14-digit Egyptian National ID number.'
                  example: "28405121234567"
                  nullable: true
                is_smoker:
                  type: boolean
                  description: 'Indicates tobacco smoking habits status.'
                  example: false
                  nullable: true
                chronic_diseases:
                  type: array
                  description: 'List of diagnosed chronic medical conditions.'
                  items:
                    type: string
                  example: ["hypertension", "diabetes"]
                  nullable: true
                previous_surgeries_name:
                  type: string
                  description: 'Names and details/dates of past surgeries.'
                  example: "Appendectomy in 2018"
                  nullable: true
                current_medications:
                  type: string
                  description: 'Active prescriptions and daily pharmaceutical drugs currently taken.'
                  example: "Metformin 500mg once daily"
                  nullable: true
                allergies:
                  type: string
                  description: 'Known immunological drug or substance hypersensitivities.'
                  example: "Penicillin allergy (skin rash)"
                  nullable: true
                family_history:
                  type: string
                  description: 'Heritable ancestral genetic chronic disease records.'
                  example: "Father had Type 2 Diabetes and Cardiovascular Disease"
                  nullable: true
                current_complaints:
                  type: string
                  description: 'Presenting active symptoms prompting the clinic visit.'
                  example: "Persistent chest discomfort and mild shortness of breath on exertion."
                  nullable: true
                lab:
                  type: array
                  description: 'Array of physical lab test files (PDF or JPG). Max 10MB per file. Conditional requirement: Required if radiology and medical_history are completely empty.'
                  items:
                    type: string
                    format: binary
                radiology:
                  type: array
                  description: 'Array of medical imaging/radiology scan reports (PDF or JPG). Max 10MB per file. Conditional requirement: Required if lab and medical_history are completely empty.'
                  items:
                    type: string
                    format: binary
                medical_history:
                  type: array
                  description: 'Array of historical patient health summaries or older text files (PDF or JPG). Max 10MB per file. Conditional requirement: Required if lab and radiology are completely empty.'
                  items:
                    type: string
                    format: binary
      responses:
        201:
          description: 'Created Successfully - Patient profile created and asynchronous AI pipeline workflows initiated.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Patient created successfully and AI analysis is in progress."
                  data:
                    type: object
                    properties:
                      patient_id:
                        type: integer
                        example: 48
                      analysis_result_id:
                        type: integer
                        example: 105
        401:
          $ref: '#/components/responses/Unauthorized'
        422:
          description: 'Validation Error - Missing structural constraints, dynamic uniqueness conflict, or conditional file grouping rules broken.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "The given data was invalid."
                  errors:
                    type: object
                    properties:
                      contact:
                        type: array
                        items:
                          type: string
                        example: ["The contact has already been taken."]
                      lab:
                        type: array
                        items:
                          type: string
                        example: ["Please upload at least one lab test result or radiology report or medical history report."]
        500:
          description: 'Internal Server Error - Operational database transaction rollback occurred during system or pipeline crash.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "An error occurred while creating patient."
                  data:
                    type: object
                    nullable: true
                    example: null


  '/api/v1/notifications':
    get:
      summary: 'Get User Notifications'
      operationId: getApiV1NotificationsIndex
      description: 'Retrieves a paginated list of notifications for the authenticated doctor using Cursor Pagination.'
      tags:
        - Notifications
      security:
        - sanctum: []
      responses:
        200:
          description: 'Notifications retrieved successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Notifications retrieved successfully."
                  data:
                    data:
                      - id: "uuid-1234-5678"
                        type: "App\\Notifications\\PatientCriticalStatus"
                        data: { "patient_name": "Ahmed Mohamed", "message": "Status changed to Critical" }
                        read_at: null
                        created_at: "2026-05-08 02:00:00"
                    next_cursor: "eyJjcmVhdGVkX2F0Ijo..."
                    next_page_url: "http://localhost:8000/api/v1/notifications?cursor=..."
                    prev_cursor: null
                    prev_page_url: null
        401:
          $ref: '#/components/responses/Unauthorized'

  '/api/v1/notifications/unread-count':
    get:
      summary: 'Get Unread Count'
      operationId: getApiV1NotificationsUnreadCount
      description: 'Returns the total number of notifications that have not been read yet.'
      tags:
        - Notifications
      security:
        - sanctum: []
      responses:
        200:
          description: 'Count retrieved successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Unread notifications count retrieved successfully."
                  data:
                    unread_count: 5

  '/api/v1/notifications/{notification}/read':
    patch:
      summary: 'Mark Single Notification as Read'
      operationId: patchApiV1NotificationsRead
      description: 'Marks a specific notification as read. Validates that the notification belongs to the authenticated doctor.'
      tags:
        - Notifications
      security:
        - sanctum: []
      parameters:
        - in: path
          name: notification
          required: true
          description: 'The UUID of the notification.'
          schema:
            type: string
            format: uuid
          example: "9a3b8d12-..."
      responses:
        200:
          description: 'Success'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Notification marked as read"
        403:
          description: 'Forbidden - Notification does not belong to you'
        401:
          $ref: '#/components/responses/Unauthorized'

  '/api/v1/notifications/read-all':
    patch:
      summary: 'Mark All as Read'
      operationId: patchApiV1NotificationsReadAll
      description: 'Marks all unread notifications for the doctor as read at once.'
      tags:
        - Notifications
      security:
        - sanctum: []
      responses:
        200:
          description: 'Success'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "All notifications marked as read"

  '/api/v1/notifications/clear-all':
    delete:
      summary: 'Delete All Notifications'
      operationId: deleteApiV1NotificationsClearAll
      description: 'Permanently deletes all notifications (read and unread) for the doctor.'
      tags:
        - Notifications
      security:
        - sanctum: []
      responses:
        200:
          description: 'Success'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "All notifications deleted successfully"

  '/api/broadcasting/auth':
    get:
      summary: 'Authenticate the request for channel access.'
      operationId: authenticateTheRequestForChannelAccess
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Notifications
      security: []



  '/api/v1/support':
    post:
      summary: 'Submit Support Ticket'
      operationId: postApiV1Support
      description: 'Allows authenticated doctors to submit support requests regarding technical issues, billing, or general inquiries. Supports optional file attachments (JPG, PNG, PDF).'
      tags:
        - Support & Help
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - category
                - urgency
                - message
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: 'Optional name. Defaults to user name if null.'
                  example: "Dr. Layla"
                  nullable: true
                category:
                  type: string
                  enum: [technical, billing, general]
                  example: "technical"
                urgency:
                  type: string
                  enum: [low, medium, high]
                  example: "high"
                message:
                  type: string
                  description: 'The content of the support request.'
                  example: "I am having trouble accessing the patient history."
                attachment:
                  type: string
                  format: binary
                  description: 'Optional file (jpg, png, pdf). Max size: 5MB.'
                  nullable: true
      responses:
        201:
          description: 'Support ticket created successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Support message submitted successfully we will get back to you shortly."
                  data: null
        401:
          $ref: '#/components/responses/Unauthorized'
        422:
          description: 'Validation Error - Check category, urgency or attachment size'
        500:
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to submit message."
                  data: null

  '/api/v1/doctors/profile':
    patch:
      summary: 'Update Doctor Profile'
      operationId: patchApiV1DoctorsProfile
      description: 'Updates the authenticated doctor’s name or specialization. Only provided fields will be updated.'
      tags:
        - Doctor Profile
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: "Dr. Layla M."
                specialization:
                  type: string
                  maxLength: 255
                  example: "Advanced Cardiology"
      responses:
        200:
          description: 'Profile updated successfully'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Profile updated successfully"
                  data: null
        401:
          $ref: '#/components/responses/Unauthorized'
        422:
          description: 'Validation Error'
        500:
          description: 'Internal Server Error'
    delete:
      summary: 'Delete Doctor Account'
      operationId: deleteApiV1DoctorsProfileDestroy
      description: 'Permanently deletes the authenticated doctor profile, invalidates all active Sanctum authentication tokens, and removes the associated user record. Requires valid password confirmation for security verification.'
      tags:
        - Doctor Profile
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - password_confirmation
              properties:
                password:
                  type: string
                  format: password
                  example: "SecretPassword123"
                password_confirmation:
                  type: string
                  format: password
                  example: "SecretPassword123"
      responses:
        200:
          description: 'Account and associated clinical profile rows deleted successfully.'
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                message: "Account deleted successfully"
                data: null
        401:
          $ref: '#/components/responses/Unauthorized'
        422:
          description: 'Validation Error - Incorrect password hash or missing confirmation fields.'
          content:
            application/json:
              schema:
                type: object
              example:
                success: false
                message: "The given data was invalid."
                errors:
                  password:
